<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>WG Testbed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" href="img/wg-logo.svg">
  <link href="css/index.css" rel="stylesheet" />
  <link href="css/output.css" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js/dist/FileSaver.min.js"></script>
  <script>function saveFileFromMEMFSToDisk(e, a) { var i, o = FS.readFile(e); i = new Blob([o.buffer], { type: "application/octet-binary" }), saveAs(i, a) }</script>
</head>

<body class="unselectable" oncontextmenu="return false;">
  <div id="wrapper">
    <div id="gameContainer">
      <!-- <audio id="bgm" loop="true" src="assets/audio/ethernight.mp3"></audio> -->
      <!-- <div id="ui"></div> -->
      <canvas class="emscripten" id="renderCanvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
     <script type="module">
       const examples = {
         remote:     "./remote_example.js",
         simple:     "./simple_example.js",
         pick:       "./pick_example.js",
         lua:        "./lua_module_example.js",
         nim:        "./nim_example.js",
         haxe:       "./haxe_example.js",
       };
       const params = new URLSearchParams(window.location.search);
       const name = params.get("example") || "remote";
       const src = examples[name];
       if (src) {
         import(/* @vite-ignore */ src);
       } else {
         const valid = Object.keys(examples).join(", ");
         console.error(`Unknown example "${name}". Valid: ${valid}`);
         document.getElementById("renderCanvas").style.display = "none";
         const msg = document.createElement("p");
         msg.style.cssText = "color:#c62828;font-family:monospace;padding:1em";
         msg.textContent = `Unknown example "${name}". Valid options: ${valid}`;
         document.getElementById("gameContainer").appendChild(msg);
       }
     </script>
    </div>
    <div id="outputContainer" class="collapsed">
      <div id="outputHeader" class="collapsed">Console</div>
      <textarea id="output" readonly></textarea>
    </div>
  </div>

  <script>
    // handle collapsing the output container
    const outputContainer = document.getElementById("outputContainer");
    const outputHeader = document.getElementById("outputHeader");

    outputHeader.addEventListener("click", () => {
      outputContainer.classList.toggle("collapsed");
      outputHeader.classList.toggle("collapsed");
    });
  </script>
</body>

</html>
