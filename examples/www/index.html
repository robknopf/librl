<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>WG Testbed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" href="img/wg-logo.svg">
  <link href="css/index.css" rel="stylesheet" />
  <link href="css/output.css" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js/dist/FileSaver.min.js"></script>
  <script>function saveFileFromMEMFSToDisk(e, a) { var i, o = FS.readFile(e); i = new Blob([o.buffer], { type: "application/octet-binary" }), saveAs(i, a) }</script>
</head>

<body class="unselectable" oncontextmenu="return false;">
  <div id="wrapper">
    <div id="gameContainer">
      <!-- <audio id="bgm" loop="true" src="assets/audio/ethernight.mp3"></audio> -->
      <!-- <div id="ui"></div> -->
      <canvas class="emscripten" id="renderCanvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
     <script type="module">
       const pageRelative = (relativePath) => new URL(relativePath, window.location.href).href;

       const examples = {
         "remote":   pageRelative("./js/remote_example.js"),
         "js":       pageRelative("./examples/js/js_example.js"),
        // "pick":     pageRelative("./examples/js/pick_example.js"),
         "c-lua":    pageRelative("./js/c-lua_example.js"),
         "c-simple": pageRelative("./js/c-simple_example.js"),
         "nim":      pageRelative("./js/nim_example.js"),
         "haxe":     pageRelative("./js/haxe_example.js")
       };

       const params = new URLSearchParams(window.location.search);
       const name = params.get("example");
       const src = name ? examples[name] : null;

       if (src) {
         // When an example is explicitly requested (?example=...), load it.
         import(/* @vite-ignore */ src);
       } else {
         // No example selected: show a list of example links instead of loading one by default.
         const canvas = document.getElementById("renderCanvas");
         if (canvas) {
           canvas.style.display = "none";
         }

         const container = document.getElementById("gameContainer");
         const listWrapper = document.createElement("div");
         listWrapper.style.cssText = "padding:1em;font-family:monospace;color:#111";

         const heading = document.createElement("h2");
         heading.textContent = "Examples";
         heading.style.cssText = "margin-bottom:0.5em;";
         listWrapper.appendChild(heading);

         const ul = document.createElement("ul");
         ul.style.cssText = "list-style:none;padding-left:0;";

         const base = new URL(window.location.href);
         base.search = "";

         for (const key of Object.keys(examples)) {
           const li = document.createElement("li");
           li.style.cssText = "margin:0.25em 0; pointer-events:auto;";

           const link = document.createElement("a");
           const url = new URL(base);
           url.search = `?example=${encodeURIComponent(key)}`;
           link.href = url.toString();
           link.textContent = key;
           link.style.cssText = "color:#1565c0;text-decoration:underline;cursor:pointer;display:inline-block;pointer-events:auto;";

           link.addEventListener("mouseover", () => {
             link.style.textDecoration = "underline";
           });
           link.addEventListener("mouseout", () => {
             link.style.textDecoration = "none";
           });

           li.appendChild(link);
           ul.appendChild(li);
         }

         listWrapper.appendChild(ul);
         container.appendChild(listWrapper);
       }
     </script>
    </div>
    <div id="outputContainer" class="collapsed">
      <div id="outputHeader" class="collapsed">Console</div>
      <textarea id="output" readonly></textarea>
    </div>
  </div>

  <script>
    // handle collapsing the output container
    const outputContainer = document.getElementById("outputContainer");
    const outputHeader = document.getElementById("outputHeader");

    outputHeader.addEventListener("click", () => {
      outputContainer.classList.toggle("collapsed");
      outputHeader.classList.toggle("collapsed");
    });
  </script>
</body>

</html>
